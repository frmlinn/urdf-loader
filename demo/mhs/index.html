<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHS Helicopter</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div id="ui-panel" class="glass-panel">
        <header>
            <h2>NASA MHS Helicopter</h2>
            <p>GLTF Loader</p>
        </header>

        <div class="toggles-container">
            <label class="toggle-row">
                <span class="toggle-label">Spin Rotors</span>
                <input type="checkbox" id="toggle-anim" checked>
                <div class="toggle-switch"></div>
            </label>
        </div>
    </div>
    
    <urdf-manipulator 
        id="viewer"
        urdf="/urdf-loader/urdf/MHS/MHS.urdf"
        package="/urdf-loader/urdf"
        up="-Z"
        display-shadow 
        ambient-color="#444444"
        highlight-color="#ffbf00">
    </urdf-manipulator>

    <script type="module" src="./main.ts"></script>
</body>
</html>
