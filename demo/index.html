<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URDF Manipulator - Demo</title>
    <style>
        body { 
            margin: 0; 
            background-color: #263238; 
            font-family: sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
        }
        
        urdf-manipulator {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <urdf-manipulator 
        urdf="/urdf/T12/urdf/T12.URDF" 
        package="/urdf"
        up="Z" 
        display-shadow 
        ambient-color="#444444"
        highlight-color="#ffbf00"
        floor-offset="0.2"> </urdf-manipulator>
    <script type="module" src="./main.ts"></script>
</body>
</html>
